<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AeroSentinel — Under Maintenance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0e14;
    --card: #111520;
    --border: #1e2433;
    --text: #c8cdd8;
    --muted: #5a6070;
    --accent: #f5a623;
    --accent-dim: #f5a62322;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background stars */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--accent);
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 4rem 3.5rem;
    max-width: 560px;
    width: 90%;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 2.5rem;
  }

  /* Spinning plane icon */
  .icon {
    width: 80px; height: 80px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2rem;
    font-size: 2.2rem;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: #fff;
  }

  p {
    color: var(--muted);
    font-size: 1.05rem;
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 1.1rem;
    background: var(--accent-dim);
    border: 1px solid #f5a62344;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Progress bar */
  .progress-container {
    margin: 2rem 0 1.5rem;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #ffcc00, var(--accent));
    background-size: 200% 100%;
    border-radius: 4px;
    animation: progress 4s ease-in-out infinite, shimmer 2s linear infinite;
  }

  @keyframes progress {
    0% { width: 0%; }
    50% { width: 75%; }
    100% { width: 95%; }
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  .footer {
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.6;
  }

  /* Floating particles */
  .particle {
    position: fixed;
    font-size: 1.2rem;
    opacity: 0.15;
    animation: float var(--dur) ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }
</style>
</head>
<body>

<!-- Background stars -->
<div class="stars" id="stars"></div>

<!-- Floating particles -->
<div class="particle" style="top:15%;left:10%;--dur:6s;">✈️</div>
<div class="particle" style="top:25%;right:15%;--dur:8s;animation-delay:1s;">🛩️</div>
<div class="particle" style="bottom:20%;left:20%;--dur:7s;animation-delay:2s;">🌙</div>
<div class="particle" style="bottom:30%;right:10%;--dur:5s;animation-delay:0.5s;">⭐</div>
<div class="particle" style="top:60%;left:5%;--dur:9s;animation-delay:3s;">✈️</div>
<div class="particle" style="top:10%;right:30%;--dur:6.5s;animation-delay:1.5s;">🛫</div>

<div class="card">
  <div class="logo">AEROSENTINEL</div>
  <div class="icon">✈️</div>
  <h1>Under Maintenance</h1>
  <p>We're currently performing scheduled maintenance to improve your experience.<br>We'll be back online shortly — thank you for your patience.</p>

  <div class="progress-container">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-text">In progress...</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="badge"><span class="dot"></span> Maintenance Mode</div>
  <div class="divider"></div>
  <div class="footer">&copy; 2026 AeroSentinel</div>
</div>

<script>
  // Generate random stars
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
    star.style.animationDelay = Math.random() * 3 + 's';
    starsContainer.appendChild(star);
  }

  // Fun progress messages
  const messages = [
    'Tuning the engines... 🔧',
    'Refueling... ⛽',
    'Checking weather radar... 🌤️',
    'Updating flight plans... 📋',
    'Polishing the wings... ✨',
    'Almost there... 🛬'
  ];
  let idx = 0;
  const progressText = document.getElementById('progress-text');
  setInterval(() => {
    idx = (idx + 1) % messages.length;
    progressText.textContent = messages[idx];
  }, 2500);
</script>
</body>
</html>
