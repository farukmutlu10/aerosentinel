<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroSentinel — Alert Sound Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a14;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      color: #d4a843;
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: #8888aa;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    .sound-card {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s;
    }

    .sound-card:hover {
      border-color: rgba(212, 168, 67, 0.4);
    }

    .sound-info {
      flex: 1;
      min-width: 0;
    }

    .sound-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .sound-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #ffffff;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .badge-premium {
      background: rgba(212, 168, 67, 0.2);
      color: #d4a843;
      border: 1px solid rgba(212, 168, 67, 0.4);
    }

    .sound-desc {
      font-size: 0.82rem;
      color: #8888aa;
      line-height: 1.4;
    }

    .sound-buttons {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-listen {
      background: linear-gradient(135deg, #d4a843, #b8922e);
      color: #0a0a14;
    }

    .btn-listen:hover {
      background: linear-gradient(135deg, #e0b650, #c9a03a);
      box-shadow: 0 0 16px rgba(212, 168, 67, 0.3);
    }

    .btn-single {
      background: rgba(255, 255, 255, 0.08);
      color: #ccccdd;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn-single:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn.playing {
      opacity: 0.5;
      pointer-events: none;
    }

    .note {
      text-align: center;
      margin-top: 48px;
      padding: 20px;
      background: rgba(212, 168, 67, 0.08);
      border: 1px solid rgba(212, 168, 67, 0.2);
      border-radius: 10px;
      color: #d4a843;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .note strong {
      color: #e0b650;
    }

    @media (max-width: 520px) {
      .sound-card {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
      }

      .sound-buttons {
        margin-left: 0;
        justify-content: stretch;
      }

      .btn {
        flex: 1;
        text-align: center;
      }

      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔔 Alert Sound Test</h1>
  <p class="subtitle">AeroSentinel — Apple tarzı imza bildirim sesi (Web Audio API)</p>

  <!-- Sound: Apple-Style Signature Notification -->
  <div class="sound-card">
    <div class="sound-info">
      <div class="sound-header">
        <span class="sound-name">Apple-Style Signature Notification</span>
        <span class="badge badge-premium">PREMIUM</span>
      </div>
      <div class="sound-desc">E5 (659.25 Hz) → C5 (523.25 Hz) · Zarif iki vuruş · 100ms gecikme · sine wave · %25 master vol</div>
    </div>
    <div class="sound-buttons">
      <button class="btn btn-listen" onclick="playAppleNotification()" id="btn-apple">▶ Dinle</button>
      <button class="btn btn-single" onclick="playAppleSingle()" id="btn-apple-s">▶ Single</button>
    </div>
  </div>

  <div class="note">
    <strong>📌 Entegrasyon Notu:</strong><br>
    Bu ses AeroSentinel bildirim sisteminde kullanılacaktır.
  </div>
</div>

<script>
  // ─── AudioContext Lazy Initialization ───
  let audioCtx = null;

  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  // ─── Helper: button cooldown ───
  function buttonCooldown(btnId, duration) {
    const btn = document.getElementById(btnId);
    btn.classList.add('playing');
    setTimeout(() => btn.classList.remove('playing'), duration * 1000);
  }

  // ═══════════════════════════════════════════
  // APPLE-STYLE SIGNATURE NOTIFICATION
  // ═══════════════════════════════════════════

  function playAppleHit(ctx, startTime) {
    const now = startTime;

    // Ana ses şiddeti (%25 seviyesi)
    const masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0.25, now);
    masterGain.connect(ctx.destination);

    // 1. VURUŞ: Yüksek ve Zarif (E5 Notası - 659.25 Hz)
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(659.25, now);

    gain1.gain.setValueAtTime(0.8, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

    osc1.connect(gain1);
    gain1.connect(masterGain);
    osc1.start(now);
    osc1.stop(now + 0.25);

    // 2. VURUŞ: 100ms sonra gelen onaylayıcı dip ton (C5 Notası - 523.25 Hz)
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(523.25, now + 0.10);

    gain2.gain.setValueAtTime(0, now);
    gain2.gain.setValueAtTime(0.9, now + 0.10);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);

    osc2.connect(gain2);
    gain2.connect(masterGain);
    osc2.start(now + 0.10);
    osc2.stop(now + 0.45);
  }

  // Full: Double-hit (two sequences)
  function playAppleNotification() {
    const ctx = getAudioContext();
    const now = ctx.currentTime;

    playAppleHit(ctx, now);
    playAppleHit(ctx, now + 0.55);

    buttonCooldown('btn-apple', 1.0);
    console.log("🔊 Apple tarzı imza bildirim sesi (double) çalındı.");
  }

  // Single: Tek vuruş
  function playAppleSingle() {
    const ctx = getAudioContext();
    const now = ctx.currentTime;

    playAppleHit(ctx, now);

    buttonCooldown('btn-apple-s', 0.5);
    console.log("🔊 Apple tarzı imza bildirim sesi (single) çalındı.");
  }
</script>

</body>
</html>
