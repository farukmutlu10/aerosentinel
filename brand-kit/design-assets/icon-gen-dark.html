<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Psilograph'; src: url('psilograph_font/Psilograph-Thin.ttf') format('truetype'); font-weight: 100; }
  @font-face { font-family: 'Psilograph'; src: url('psilograph_font/Psilograph-SemiBold.ttf') format('truetype'); font-weight: 600; }
  * { margin: 0; padding: 0; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; background: transparent; }
  .icon {
    width: 1024px;
    height: 1024px;
    background: #0f0f1a;
    border-radius: 223px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
  }
  .text {
    font-family: 'Psilograph', Impact, sans-serif;
    text-transform: uppercase;
    font-size: 1336px;
    line-height: 0.7;
    letter-spacing: -26.6px;
    display: flex;
    white-space: nowrap;
    margin-top: 140px;
  }
  .text .a { font-weight: 100; color: #d4a843; }
  .text .s { font-weight: 600; color: #d4a843; }
</style>
</head>
<body>
<div class="icon">
  <div class="text"><span class="a">A</span><span class="s">S</span></div>
</div>
</body>
</html>
